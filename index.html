<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker - Painel Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen p-6">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-blue-900">💰 Budget Tracker</h1>
            <p class="text-gray-600">Controle de Gastos com Alertas Inteligentes</p>
        </header>

        <div class="bg-white p-6 rounded-lg shadow-md mb-6">
            <h2 class="text-xl font-semibold mb-4">📊 Dashboard</h2>
            <div id="dashboard" class="grid grid-cols-2 gap-4">
                <div><strong>Total Gasto:</strong> <span id="total-gasto">R$ 0,00</span></div>
                <div><strong>Categorias:</strong> <span id="total-categorias">0</span></div>
                <div><strong>Maior Categoria:</strong> <span id="maior-categoria">-</span></div>
                <div><strong>Maior Gasto:</strong> <span id="maior-gasto">R$ 0,00</span></div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-lg shadow-md mb-4">
            <h2 class="font-semibold mb-2">Filtrar por Período</h2>
            <input id="data-inicio" type="date" class="border p-2 rounded">
            <input id="data-fim" type="date" class="border p-2 rounded">
            <button onclick="filtrarDespesas()" class="bg-blue-600 text-white px-4 py-2 rounded">
                Filtrar
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <div class="md:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">Nova Categoria</h2>
                    <div class="space-y-3">
                        <input id="cat-nome" type="text" placeholder="Ex: Alimentação" class="w-full p-2 border rounded">
                        <input id="cat-teto" type="number" placeholder="Teto Mensal (R$)" class="w-full p-2 border rounded">
                        <button onclick="criarCategoria()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-2 rounded font-medium">Criar</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">Nova Despesa</h2>
                    <div class="space-y-3">
                        <input id="desp-desc" type="text" placeholder="Ex: Mercado" class="w-full p-2 border rounded">
                        <input id="desp-valor" type="number" placeholder="Valor (R$)" class="w-full p-2 border rounded">
                        <select id="desp-cat" class="w-full p-2 border rounded">
                            <option value="" disabled selected>Categoria existente</option>
                        </select>
                        <button onclick="registrarDespesa()" class="w-full bg-green-600 hover:bg-green-700 text-white p-2 rounded font-medium">Registrar</button>
                    </div>
                </div>
            </div>

            <div class="md:col-span-2 space-y-6">
                <div id="painel-alertas" class="hidden p-4 rounded-lg font-bold shadow animate-bounce"></div>

                <div class="bg-white p-6 rounded-lg shadow-md">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">Suas Categorias</h2>
                        <button onclick="carregarCategorias()" class="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded">🔄 Atualizar</button>
                    </div>
                    <div id="lista-categorias" class="space-y-4">
                        <p class="text-gray-500 italic text-center">Nenhuma categoria carregada.</p>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">Registro de Despesas</h2>
                    <div id="lista-despesas" class="space-y-2">
                        <p class="text-gray-500 italic text-center">Nenhuma despesa carregada.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";

        async function carregarDashboard() {
            const resposta = await fetch(`${API_URL}/dashboard`);
            const dados = await resposta.json();
            document.getElementById('total-gasto').innerText = `R$ ${dados.total_gasto.toFixed(2)}`;
            document.getElementById('total-categorias').innerText = dados.total_categorias;
            document.getElementById('maior-categoria').innerText = dados.maior_categoria ?? "-";
            document.getElementById('maior-gasto').innerText = `R$ ${dados.maior_gasto.toFixed(2)}`;
        }

        async function filtrarDespesas() {
            const inicio = document.getElementById('data-inicio').value;
            const fim = document.getElementById('data-fim').value;

            if (!inicio || !fim) {
                alert("Selecione as duas datas para filtrar.");
                return;
            }

            const resposta = await fetch(`${API_URL}/despesas/filtro?inicio=${inicio}&fim=${fim}`);
            const despesas = await resposta.json();
            const container = document.getElementById('lista-despesas');
            container.innerHTML = "";

            if (despesas.length === 0) {
                container.innerHTML = '<p class="text-gray-500 italic text-center">Nenhuma despesa neste período.</p>';
                return;
            }

            despesas.forEach(d => {
                container.innerHTML += `
                    <div class="flex justify-between p-2 border-b">
                        <span>${d.descricao} - <strong>R$ ${d.valor.toFixed(2)}</strong> (${d.categoria_nome}) — ${d.data}</span>
                    </div>
                `;
            });
        }

        async function carregarCategorias() {
            const resposta = await fetch(`${API_URL}/categorias/`);
            const categorias = await resposta.json();
            const container = document.getElementById('lista-categorias');
            const select = document.getElementById('desp-cat');

            container.innerHTML = "";
            // CORRIGIDO: limpa e repopula o select junto com a lista
            select.innerHTML = '<option value="" disabled selected>Categoria existente</option>';

            if (categorias.length === 0) {
                container.innerHTML = '<p class="text-gray-500 italic text-center">Nenhuma categoria carregada.</p>';
                return;
            }

            categorias.forEach(cat => {
                const percentual = Math.min((cat.total_gasto / cat.teto_mensal) * 100, 100);
                let corBarra = "bg-blue-500";
                if (percentual >= 100) corBarra = "bg-red-600";
                else if (percentual >= 80) corBarra = "bg-yellow-500";

                container.innerHTML += `
                    <div class="border-b pb-3">
                        <div class="flex justify-between font-medium text-gray-700">
                            <span class="capitalize font-bold">${cat.nome}</span>
                            <div>
                                <span>R$ ${cat.total_gasto.toFixed(2)} / R$ ${cat.teto_mensal.toFixed(2)}</span>
                                <button onclick="excluirCategoria('${cat.nome}')" class="ml-3 text-red-500 text-xs hover:underline">Excluir</button>
                            </div>
                        </div>
                        <div class="w-full bg-gray-200 h-3 rounded-full mt-1 overflow-hidden">
                            <div class="${corBarra} h-full" style="width: ${percentual}%"></div>
                        </div>
                    </div>
                `;

                // Popula o select de despesas
                select.innerHTML += `<option value="${cat.nome}">${cat.nome}</option>`;
            });
        }

        async function criarCategoria() {
            const nome = document.getElementById('cat-nome').value.trim();
            const teto = document.getElementById('cat-teto').value;

            if (!nome || !teto) {
                alert("Preencha o nome e o teto da categoria.");
                return;
            }

            const res = await fetch(`${API_URL}/categorias/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, teto_mensal: parseFloat(teto) })
            });

            if (res.ok) {
                document.getElementById('cat-nome').value = '';
                document.getElementById('cat-teto').value = '';
                carregarCategorias();
                carregarDashboard();
            } else {
                const erro = await res.json();
                alert(erro.detail);
            }
        }

        async function excluirCategoria(nome) {
            if (confirm(`Excluir categoria '${nome}' e todas as suas despesas?`)) {
                await fetch(`${API_URL}/categorias/${nome}`, { method: 'DELETE' });
                carregarCategorias();
                carregarDespesas();
                carregarDashboard();
            }
        }

        async function carregarDespesas() {
            const resposta = await fetch(`${API_URL}/despesas/`);
            const despesas = await resposta.json();
            const container = document.getElementById('lista-despesas');
            container.innerHTML = "";

            if (despesas.length === 0) {
                container.innerHTML = '<p class="text-gray-500 italic text-center">Nenhuma despesa cadastrada.</p>';
                return;
            }

            despesas.forEach(d => {
                container.innerHTML += `
                    <div class="flex justify-between items-center p-2 border-b">
                        <span>${d.descricao} - <strong>R$ ${d.valor.toFixed(2)}</strong> (${d.categoria_nome}) — ${d.data}</span>
                        <button onclick="excluirDespesa(${d.id})" class="bg-red-500 text-white px-2 py-1 rounded text-xs">Excluir</button>
                    </div>
                `;
            });
        }

        async function registrarDespesa() {
            const desc = document.getElementById('desp-desc').value.trim();
            const valor = document.getElementById('desp-valor').value;
            const cat = document.getElementById('desp-cat').value;

            if (!desc || !valor || !cat) {
                alert("Preencha todos os campos da despesa.");
                return;
            }

            const res = await fetch(`${API_URL}/despesas/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ descricao: desc, valor: parseFloat(valor), categoria_nome: cat })
            });

            if (res.ok) {
                const dados = await res.json();

                // Exibe alerta visual se houver aviso da API
                const painel = document.getElementById('painel-alertas');
                if (dados.ALERTA_CRITICO) {
                    painel.className = "p-4 rounded-lg font-bold shadow animate-bounce bg-red-100 text-red-700";
                    painel.innerText = dados.ALERTA_CRITICO;
                } else if (dados.AVISO) {
                    painel.className = "p-4 rounded-lg font-bold shadow animate-bounce bg-yellow-100 text-yellow-700";
                    painel.innerText = dados.AVISO;
                } else {
                    painel.className = "hidden";
                }

                document.getElementById('desp-desc').value = '';
                document.getElementById('desp-valor').value = '';
                carregarCategorias();
                carregarDespesas();
                carregarDashboard();
            } else {
                const erro = await res.json();
                alert(erro.detail);
            }
        }

        async function excluirDespesa(id) {
            await fetch(`${API_URL}/despesas/${id}`, { method: 'DELETE' });
            carregarCategorias();
            carregarDespesas();
            carregarDashboard();
        }

        // Inicialização
        carregarDashboard();
        carregarCategorias();
        carregarDespesas();
    </script>
</body>
</html>
